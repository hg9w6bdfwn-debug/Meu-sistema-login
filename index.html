<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle iOS</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 360px; text-align: center;
        }
        h2 { margin-bottom: 5px; color: #1c1c1e; }
        p { font-size: 14px; color: #8e8e93; margin-top: 0; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 14px; color: #1c1c1e; display: block; margin-bottom: 5px; }
        input {
            width: 100%; padding: 12px; border: 1px solid #d1d1d6;
            border-radius: 10px; font-size: 16px; box-sizing: border-box; background-color: #f2f2f7;
        }
        input:focus { outline: none; border-color: #007aff; background-color: white; }
        button {
            width: 100%; padding: 14px; background-color: #5856d6; color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 15px; transition: background 0.2s;
        }
        button:hover { background-color: #43419b; }
        .error { color: #ff3b30; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Painel de Controle iOS</h2>
        <p>Insira suas credenciais de acesso</p>
        {% if erro %}
            <div class="error">{{ erro }}</div>
        {% endif %}
        <form action="/login" method="POST">
            <div class="input-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="admin" required>
            </div>
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
